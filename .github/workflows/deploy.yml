name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push images
        run: |
          ECR=875926135310.dkr.ecr.ap-south-1.amazonaws.com
          SHA=${{ github.sha }}

          docker buildx build --platform linux/amd64 --provenance=false \
            -t $ECR/openrelay-ingestion:$SHA \
            -t $ECR/openrelay-ingestion:latest \
            --push ./ingestion-service

          docker buildx build --platform linux/amd64 --provenance=false \
            -t $ECR/openrelay-worker:$SHA \
            -t $ECR/openrelay-worker:latest \
            --push ./worker-service

          docker buildx build --platform linux/amd64 --provenance=false \
            -t $ECR/openrelay-api:$SHA \
            -t $ECR/openrelay-api:latest \
            --push ./api-service

          docker buildx build --platform linux/amd64 --provenance=false \
            -t $ECR/openrelay-dashboard:$SHA \
            -t $ECR/openrelay-dashboard:latest \
            --push ./dashboard

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 875926135310.dkr.ecr.ap-south-1.amazonaws.com
            cd /app
            sudo docker-compose -f docker-compose.prod.yml pull
            sudo docker-compose -f docker-compose.prod.yml up -d
            sudo docker image prune -f